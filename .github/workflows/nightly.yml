name: Nightly Data Export

on:
  schedule:
    # 16:00 UTC is 00:00 (Midnight) in Malaysia (UTC+8)
    - cron: '0 16 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub for testing

jobs:
  export-and-clean:
    runs-on: ubuntu-latest
    
    # Give the robot permission to save files back to your project
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Nightly Export
        # The robot gets its keys from GitHub Secrets (see step below)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/nightly_export.py

      - name: Save CSV to project
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/*.csv
          git commit -m "Automated nightly export [skip ci]" || echo "No data to save today"
          git push
