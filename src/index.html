<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid KL Live Status</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🚆 Rapid KL Live</h1>
            <div class="input-group" style="margin-top: 10px;">
                <select id="station-selector" style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee; font-size: 16px; background: white;">
                    <option value="KL Sentral">KL Sentral</option>
                    <!-- Other stations will be loaded here by JS -->
                </select>
            </div>
        </header>

        <main>
            <!-- Status Card -->
            <div id="status-card" class="card status-smooth">
                <div class="status-header">
                    <div class="status-icon">🟢</div>
                    <div class="status-text">
                        <h2 id="current-status">Smooth</h2>
                        <p id="status-meta">Last updated: Just now</p>
                    </div>
                </div>
                
                <!-- Verification Buttons -->
                <div id="verify-actions" class="verify-container" style="display: none;">
                    <p class="verify-label">Is this still accurate?</p>
                    <div class="verify-buttons">
                        <button id="confirm-btn" class="btn btn-confirm">Still Happening</button>
                        <button id="resolve-btn" class="btn btn-resolve">Resolved</button>
                    </div>
                </div>
            </div>

            <!-- Report Section -->
            <section id="report-section" class="card">
                <h3>Report Condition</h3>
                <div class="button-group">
                    <button class="btn btn-smooth" data-status="smooth">Smooth</button>
                    <button class="btn btn-slow" data-status="slow">Slow</button>
                    <button class="btn btn-interrupted" data-status="interrupted">Interrupted</button>
                </div>

                <!-- NEW: Quick Categories -->
                <div id="category-section" style="margin-top: 15px;">
                    <p style="font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px;">Reason (Optional):</p>
                    <div class="category-grid">
                        <button class="category-btn" data-category="technical">🚨 Technical</button>
                        <button class="category-btn" data-category="crowd">👥 Crowd</button>
                        <button class="category-btn" data-category="weather">⛈️ Weather</button>
                        <button class="category-btn" data-category="facility">🛠️ Facility</button>
                    </div>
                </div>
                
                <!-- Comment Box -->
                <div class="input-group" style="margin-top: 15px;">
                    <label for="comment-body">Add a Comment (Optional):</label>
                    <textarea id="comment-body" maxlength="280" placeholder="e.g. Train stuck for 5 mins..." style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee; min-height: 80px; box-sizing: border-box;"></textarea>
                </div>
            </section>

            <!-- NEW: Comments Feed -->
            <section id="comments-section" class="card">
                <h3>Live Feed</h3>
                <div id="comments-list">
                    <p style="color: #65676b; font-size: 14px;">No comments yet.</p>
                </div>
            </section>

            <section id="auth-section">
                <button id="login-btn" class="btn btn-primary">Login to Report</button>
                <button id="logout-btn" class="btn btn-secondary" style="display: none;">Logout</button>
            </section>
        </main>

        <!-- Login Modal -->
        <div id="login-modal" class="modal" style="display: none;">
            <div class="modal-content card">
                <span class="close-modal">&times;</span>
                <h3 id="modal-title">Login</h3>
                <form id="auth-form">
                    <div class="input-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required placeholder="commuter@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required placeholder="Minimum 6 characters">
                    </div>
                    <button type="submit" id="submit-auth" class="btn btn-primary">Sign In</button>
                    <p id="toggle-auth" style="text-align: center; cursor: pointer; color: #007bff; font-size: 14px; margin-top: 15px;">
                        Need an account? Sign Up
                    </p>
                </form>
            </div>
        </div>

        <footer>
            <p>Community-powered • Not an official Prasarana app</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/reports.js"></script>
</body>
</html>
